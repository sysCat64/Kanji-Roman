name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and package static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate public site files
        run: PYTHONDONTWRITEBYTECODE=1 bash hooks/preflight.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site/data _site/design
          cp index.html .nojekyll _site/
          cp data/site-index.json _site/data/
          cp -R data/radicals _site/data/
          cp design/radical-kanji-ui.html _site/design/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
